<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hub Atourin app icon">
  <title>Hub Atourin — App Icon</title>
  <defs>
    <linearGradient id="hubBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7E76DD"/>
      <stop offset="1" stop-color="#574BAE"/>
    </linearGradient>
  </defs>
  <!-- Rounded-square background (Atourin purple). For Android maskable, the
       pin+network sits inside the safe zone; OS masks the corners. -->
  <rect x="0" y="0" width="512" height="512" rx="115" fill="url(#hubBg)"/>
  <!-- Pin + network shifted up 28px so the bounding box is optically centered -->
  <g transform="translate(0,-28)">
    <!-- Location pin (Atourin DNA) -->
    <path d="M256 96 C170 96 100 166 100 252 C100 330 200 384 248 470 Q256 482 264 470 C312 384 412 330 412 252 C412 166 342 96 256 96 Z" fill="#FFFFFF"/>
    <!-- Hub network: center node connected to three village nodes -->
    <line x1="256" y1="236" x2="256" y2="150" stroke="#6B5FD6" stroke-width="14" stroke-linecap="round"/>
    <line x1="256" y1="236" x2="182" y2="300" stroke="#6B5FD6" stroke-width="14" stroke-linecap="round"/>
    <line x1="256" y1="236" x2="330" y2="300" stroke="#6B5FD6" stroke-width="14" stroke-linecap="round"/>
    <circle cx="256" cy="150" r="23" fill="#6B5FD6"/>
    <circle cx="182" cy="300" r="23" fill="#6B5FD6"/>
    <circle cx="330" cy="300" r="23" fill="#6B5FD6"/>
    <circle cx="256" cy="236" r="36" fill="#FFC442"/>
  </g>
</svg>
