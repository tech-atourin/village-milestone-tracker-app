    </g>
  </g>

  <!-- Wordmark text (white) -->
  <g font-family="Product Sans, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
    <text x="340" y="64" font-size="34" font-weight="400" letter-spacing="6" fill="#FFFFFF" opacity="0.7">VILLAGE</text>
    <text x="340" y="146" font-size="78" font-weight="700" letter-spacing="-1.5" fill="#FFFFFF">Milestone</text>
    <text x="340" y="228" font-size="78" font-weight="700" letter-spacing="-1.5" fill="#FFC442">Tracker</text>
  </g>
