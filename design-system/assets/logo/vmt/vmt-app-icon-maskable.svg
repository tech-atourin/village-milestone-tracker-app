<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Village Milestone Tracker app icon (maskable)">
  <title>Village Milestone Tracker — App Icon (Maskable)</title>
  <defs>
    <linearGradient id="vmtBgMask" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7E76DD"/>
      <stop offset="1" stop-color="#574BAE"/>
    </linearGradient>
    <filter id="vmtSoftMask" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Full-bleed background for OS masking -->
  <rect x="0" y="0" width="512" height="512" fill="url(#vmtBgMask)"/>

  <!-- Safe zone is 256px centered radius (Android maskable spec).
       Scale content to fit within 80–432 (~75% area). -->
  <g transform="translate(64, 64) scale(0.75)">
    <!-- Subtle base ground line -->
    <rect x="80" y="396" width="352" height="6" rx="3" fill="#FFFFFF" opacity="0.25"/>

    <!-- 4 ascending bars -->
    <rect x="110" y="316" width="56" height="80"  rx="10" fill="#FFFFFF" opacity="0.55"/>
    <rect x="190" y="256" width="56" height="140" rx="10" fill="#FFFFFF" opacity="0.7"/>
    <rect x="270" y="196" width="56" height="200" rx="10" fill="#FFFFFF" opacity="0.85"/>
    <rect x="350" y="136" width="56" height="260" rx="10" fill="#FFFFFF"/>

    <!-- Connecting milestone path -->
    <path d="M138 326 L218 266 L298 206 L378 146"
          stroke="#FFC442" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <circle cx="138" cy="326" r="8" fill="#FFC442" opacity="0.7"/>
    <circle cx="218" cy="266" r="8" fill="#FFC442" opacity="0.85"/>
    <circle cx="298" cy="206" r="8" fill="#FFC442"/>

    <!-- Achievement pin at peak -->
    <g transform="translate(378, 130)">
      <circle cx="0" cy="-30" r="40" fill="#FFC442" opacity="0.25" filter="url(#vmtSoftMask)"/>
      <path d="M0 -76 C-22 -76 -38 -60 -38 -38 C-38 -20 -16 -8 -3 14 Q0 18 3 14 C16 -8 38 -20 38 -38 C38 -60 22 -76 0 -76 Z" fill="#FFC442"/>
      <circle cx="0" cy="-42" r="11" fill="#574BAE"/>
    </g>
  </g>
</svg>
